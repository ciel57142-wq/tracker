<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d0f; --panel:#16161a; --panel-2:#1e1e24; --line:#2a2a32;
    --ink:#f4f1e8; --dim:#8a8a96; --acc:#ff5c2b; --acc-2:#43e0a8; --warn:#ffd23f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:'Space Mono',monospace;min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,92,43,.08), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(67,224,168,.07), transparent 45%);
  }
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px 80px}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;border-bottom:2px solid var(--line);padding-bottom:20px}
  h1{font-family:'Archivo Black',sans-serif;font-size:clamp(26px,6vw,44px);line-height:.95;letter-spacing:-1px;text-transform:uppercase}
  h1 span{color:var(--acc)}
  .tag{color:var(--dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:10px}
  .synced{color:var(--acc-2)}
  nav{display:flex;gap:8px;margin-bottom:24px}
  .tab{flex:1;padding:14px;background:var(--panel);border:2px solid var(--line);color:var(--dim);font-family:'Space Mono',monospace;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.15s;border-radius:2px}
  .tab.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .tab:hover:not(.active){border-color:var(--acc);color:var(--ink)}
  .view{display:none;animation:fade .25s ease}
  .view.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .addbar{display:flex;gap:8px;margin-bottom:20px}
  input[type=text]{flex:1;background:var(--panel);border:2px solid var(--line);color:var(--ink);padding:14px 16px;font-family:'Space Mono',monospace;font-size:15px;border-radius:2px}
  input[type=text]:focus{outline:none;border-color:var(--acc)}
  input::placeholder{color:var(--dim)}
  .btn{background:var(--acc);color:#fff;border:none;padding:0 22px;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;border-radius:2px;text-transform:uppercase;transition:.15s}
  .btn:hover{filter:brightness(1.12)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:var(--dim);font-size:12px;letter-spacing:1px;text-transform:uppercase}
  .meta b{color:var(--acc-2)}
  .list{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--panel);border:2px solid var(--line);border-radius:2px;padding:16px;display:flex;align-items:center;gap:14px;transition:.15s}
  .card:hover{border-color:var(--panel-2);background:var(--panel-2)}
  .card.clickable{cursor:pointer}
  .count{flex:none;min-width:54px;height:54px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:22px;background:var(--bg);border:2px solid var(--acc);color:var(--acc)}
  .r .count,.e .count{border-color:var(--acc-2);color:var(--acc-2)}
  .body{flex:1;min-width:0}
  .name{font-size:16px;font-weight:700;word-break:break-word}
  .name.editing{display:none}
  .editinp{display:none;width:100%;background:var(--bg);border:2px solid var(--acc);color:var(--ink);padding:8px 10px;font-family:'Space Mono',monospace;font-size:15px;border-radius:2px}
  .editinp.show{display:block}
  .sub{color:var(--dim);font-size:11px;letter-spacing:1px;margin-top:3px;text-transform:uppercase}
  .acts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .ib{background:var(--bg);border:2px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:2px;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:'Space Mono',monospace}
  .ib:hover{border-color:var(--acc);color:var(--acc)}
  .ib.minus:hover{border-color:var(--warn);color:var(--warn)}
  .ib.del:hover{border-color:#ff3b3b;color:#ff3b3b;background:rgba(255,59,59,.08)}
  .ib.ok:hover{border-color:var(--acc-2);color:var(--acc-2)}
  .empty{text-align:center;padding:50px 20px;color:var(--dim);border:2px dashed var(--line);border-radius:2px}
  .empty span{font-size:36px;display:block;margin-bottom:10px}
  .crumb{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .back{background:var(--panel);border:2px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:2px;cursor:pointer;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;letter-spacing:1px;transition:.15s}
  .back:hover{border-color:var(--acc);color:var(--acc)}
  .crumb h2{font-family:'Archivo Black',sans-serif;font-size:clamp(18px,4vw,26px);text-transform:uppercase;letter-spacing:-.5px}
  footer{margin-top:40px;text-align:center;color:var(--dim);font-size:11px;letter-spacing:2px;text-transform:uppercase}

  /* tap targets sized for touch, no zoom-on-focus */
  .ib,.btn,.tab,.back{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  input[type=text]{font-size:16px} /* prevents iOS auto-zoom */

  @media (max-width:560px){
    .wrap{padding:20px 14px 64px}
    header{padding-bottom:16px;margin-bottom:18px}
    .tab{padding:13px 8px;font-size:12px;letter-spacing:.5px}
    /* let the card wrap: count+name on top row, actions on their own row */
    .card{flex-wrap:wrap;padding:14px;gap:12px}
    .body{flex:1 1 auto;min-width:0;order:1}
    .count{order:0}
    .acts{order:2;flex-basis:100%;justify-content:space-between;gap:8px;border-top:1px solid var(--line);padding-top:12px}
    .ib{flex:1;height:44px;font-size:18px;max-width:none}
    .addbar{gap:6px}
    .btn{padding:0 16px;font-size:13px}
    .meta{font-size:11px;gap:8px}
    .empty{padding:40px 16px}
  }
  @media (max-width:380px){
    h1{font-size:24px}
    .tab span{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Mission<br><span>Control</span></h1>
      <div class="tag">crud tracker · <span class="synced">synced across devices</span></div>
    </div>
  </header>

  <nav>
    <button class="tab active" data-v="events" onclick="switchView('events')">◆ Events</button>
    <button class="tab" data-v="routines" onclick="switchView('routines')">↻ Routines</button>
  </nav>

  <!-- EVENTS -->
  <section id="events" class="view show">
    <div id="eventListWrap">
      <div class="addbar">
        <input type="text" id="eInput" placeholder="New event…" maxlength="120" onkeydown="if(event.key==='Enter')addEvent()">
        <button class="btn" id="eAdd" onclick="addEvent()">Add</button>
      </div>
      <div class="meta"><span>Each event holds up to 20 missions</span><span><b id="eCount">0</b> events</span></div>
      <div class="list" id="eList"></div>
    </div>

    <div id="eventDetail" style="display:none">
      <div class="crumb">
        <button class="back" onclick="closeEvent()">← Events</button>
        <h2 id="evTitle"></h2>
      </div>
      <div class="addbar">
        <input type="text" id="mInput" placeholder="New mission…" maxlength="120" onkeydown="if(event.key==='Enter')addMission()">
        <button class="btn" id="mAdd" onclick="addMission()">Add</button>
      </div>
      <div class="meta"><span>Counter increments per mission</span><span><b id="mCount">0</b> / 20</span></div>
      <div class="list" id="mList"></div>
    </div>
  </section>

  <!-- ROUTINES -->
  <section id="routines" class="view">
    <div class="addbar">
      <input type="text" id="rInput" placeholder="New routine…" maxlength="120" onkeydown="if(event.key==='Enter')addRoutine()">
      <button class="btn" id="rAdd" style="background:var(--acc-2);color:#04150d" onclick="addRoutine()">Add</button>
    </div>
    <div class="meta"><span>Counter = times used</span><span><b id="rCount">0</b> routines</span></div>
    <div class="list" id="rList"></div>
  </section>

  <footer>Data is tied to your account — open anywhere, it follows you</footer>
</div>

<script>
const MAX_MISSIONS = 20;
const state = { events: [], routines: [] };
let openEventId = null;

async function load(){
  try{ const a = await window.storage.get('events'); if(a) state.events = JSON.parse(a.value); }catch(e){}
  try{ const b = await window.storage.get('routines'); if(b) state.routines = JSON.parse(b.value); }catch(e){}
  renderEvents(); renderRoutines();
}
async function saveEvents(){ try{ await window.storage.set('events', JSON.stringify(state.events)); }catch(e){console.error(e);} }
async function saveRoutines(){ try{ await window.storage.set('routines', JSON.stringify(state.routines)); }catch(e){console.error(e);} }

const uid = ()=>Date.now()+''+Math.random().toString(36).slice(2,6);
const esc = s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function switchView(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.toggle('show', s.id===v));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.v===v));
}

/* ===== EVENTS ===== */
function addEvent(){
  const inp = document.getElementById('eInput');
  const name = inp.value.trim(); if(!name) return;
  state.events.push({id:uid(), name, missions:[]});
  inp.value=''; saveEvents(); renderEvents();
}
function delEvent(e,id){
  if(e) e.stopPropagation();
  state.events = state.events.filter(x=>x.id!==id);
  saveEvents(); renderEvents();
}
function startEditEvent(e,id){
  e.stopPropagation();
  const card = document.getElementById('ev-'+id);
  card.querySelector('.name').classList.add('editing');
  const ei = card.querySelector('.editinp'); ei.classList.add('show'); ei.focus(); ei.select();
}
function commitEditEvent(id,val){
  const ev = state.events.find(x=>x.id===id); const name=val.trim();
  if(ev && name) ev.name = name;
  saveEvents(); renderEvents();
}
function openEvent(id){
  openEventId = id;
  document.getElementById('eventListWrap').style.display='none';
  document.getElementById('eventDetail').style.display='block';
  renderMissions();
}
function closeEvent(){
  openEventId = null;
  document.getElementById('eventDetail').style.display='none';
  document.getElementById('eventListWrap').style.display='block';
  renderEvents();
}
function renderEvents(){
  const list = document.getElementById('eList');
  document.getElementById('eCount').textContent = state.events.length;
  if(state.events.length===0){
    list.innerHTML = `<div class="empty"><span>◆</span>No events yet — add one above.</div>`;
    return;
  }
  list.innerHTML = state.events.map(ev=>`
    <div class="card e clickable" id="ev-${ev.id}" onclick="openEvent('${ev.id}')">
      <div class="count">${ev.missions.length}</div>
      <div class="body">
        <div class="name">${esc(ev.name)}</div>
        <input class="editinp" value="${esc(ev.name)}" maxlength="120" onclick="event.stopPropagation()"
          onkeydown="event.stopPropagation();if(event.key==='Enter')commitEditEvent('${ev.id}',this.value);if(event.key==='Escape')renderEvents()"
          onblur="commitEditEvent('${ev.id}',this.value)">
        <div class="sub">${ev.missions.length}/20 missions · tap to open</div>
      </div>
      <div class="acts">
        <button class="ib ok" title="Open" onclick="event.stopPropagation();openEvent('${ev.id}')">→</button>
        <button class="ib" title="Rename" onclick="startEditEvent(event,'${ev.id}')">✎</button>
        <button class="ib del" title="Delete" onclick="delEvent(event,'${ev.id}')">✕</button>
      </div>
    </div>`).join('');
}

/* ===== MISSIONS (inside an event) ===== */
function curEvent(){ return state.events.find(x=>x.id===openEventId); }
function addMission(){
  const ev = curEvent(); if(!ev || ev.missions.length>=MAX_MISSIONS) return;
  const inp = document.getElementById('mInput');
  const name = inp.value.trim(); if(!name) return;
  ev.missions.push({id:uid(), name, count:0});
  inp.value=''; saveEvents(); renderMissions();
}
function stepMission(id,d){
  const ev = curEvent(); const m = ev.missions.find(x=>x.id===id); if(!m) return;
  m.count = Math.max(0, m.count + d); saveEvents(); renderMissions();
}
function delMission(id){
  const ev = curEvent(); ev.missions = ev.missions.filter(x=>x.id!==id);
  saveEvents(); renderMissions();
}
function startEditMission(id){
  const card = document.getElementById('m-'+id);
  card.querySelector('.name').classList.add('editing');
  const ei = card.querySelector('.editinp'); ei.classList.add('show'); ei.focus(); ei.select();
}
function commitEditMission(id,val){
  const ev = curEvent(); const m = ev.missions.find(x=>x.id===id); const name=val.trim();
  if(m && name) m.name = name; saveEvents(); renderMissions();
}
function renderMissions(){
  const ev = curEvent(); if(!ev) return;
  document.getElementById('evTitle').textContent = ev.name;
  document.getElementById('mCount').textContent = ev.missions.length;
  const full = ev.missions.length>=MAX_MISSIONS;
  document.getElementById('mAdd').disabled = full;
  document.getElementById('mInput').disabled = full;
  const list = document.getElementById('mList');
  if(ev.missions.length===0){
    list.innerHTML = `<div class="empty"><span>◆</span>No missions in this event yet.</div>`;
    return;
  }
  list.innerHTML = ev.missions.map(m=>`
    <div class="card" id="m-${m.id}">
      <div class="count">${m.count}</div>
      <div class="body">
        <div class="name">${esc(m.name)}</div>
        <input class="editinp" value="${esc(m.name)}" maxlength="120"
          onkeydown="if(event.key==='Enter')commitEditMission('${m.id}',this.value);if(event.key==='Escape')renderMissions()"
          onblur="commitEditMission('${m.id}',this.value)">
        <div class="sub">progress count</div>
      </div>
      <div class="acts">
        <button class="ib minus" title="−1" onclick="stepMission('${m.id}',-1)">−</button>
        <button class="ib ok" title="+1" onclick="stepMission('${m.id}',1)">+</button>
        <button class="ib" title="Edit" onclick="startEditMission('${m.id}')">✎</button>
        <button class="ib del" title="Delete" onclick="delMission('${m.id}')">✕</button>
      </div>
    </div>`).join('');
}

/* ===== ROUTINES ===== */
function addRoutine(){
  const inp = document.getElementById('rInput');
  const name = inp.value.trim(); if(!name) return;
  state.routines.push({id:uid(), name, count:0});
  inp.value=''; saveRoutines(); renderRoutines();
}
function stepRoutine(id,d){
  const r = state.routines.find(x=>x.id===id); if(!r) return;
  r.count = Math.max(0, r.count + d); saveRoutines(); renderRoutines();
}
function delRoutine(id){
  state.routines = state.routines.filter(x=>x.id!==id); saveRoutines(); renderRoutines();
}
function startEditRoutine(id){
  const card = document.getElementById('r-'+id);
  card.querySelector('.name').classList.add('editing');
  const ei = card.querySelector('.editinp'); ei.classList.add('show'); ei.focus(); ei.select();
}
function commitEditRoutine(id,val){
  const r = state.routines.find(x=>x.id===id); const name=val.trim();
  if(r && name) r.name = name; saveRoutines(); renderRoutines();
}
function renderRoutines(){
  const list = document.getElementById('rList');
  document.getElementById('rCount').textContent = state.routines.length;
  if(state.routines.length===0){
    list.innerHTML = `<div class="empty"><span>↻</span>No routines yet — add one above.</div>`;
    return;
  }
  list.innerHTML = state.routines.map(r=>`
    <div class="card r" id="r-${r.id}">
      <div class="count">${r.count}</div>
      <div class="body">
        <div class="name">${esc(r.name)}</div>
        <input class="editinp" value="${esc(r.name)}" maxlength="120"
          onkeydown="if(event.key==='Enter')commitEditRoutine('${r.id}',this.value);if(event.key==='Escape')renderRoutines()"
          onblur="commitEditRoutine('${r.id}',this.value)">
        <div class="sub">${r.count===1?'1 use':r.count+' uses'}</div>
      </div>
      <div class="acts">
        <button class="ib minus" title="−1" onclick="stepRoutine('${r.id}',-1)">−</button>
        <button class="ib ok" title="+1 use" onclick="stepRoutine('${r.id}',1)">+</button>
        <button class="ib" title="Edit" onclick="startEditRoutine('${r.id}')">✎</button>
        <button class="ib del" title="Delete" onclick="delRoutine('${r.id}')">✕</button>
      </div>
    </div>`).join('');
}

load();
</script>
</body>
</html>
